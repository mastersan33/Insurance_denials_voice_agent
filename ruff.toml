[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    ".venv", "venv", "build", "dist", "__pycache__",
    "backend/alembic/versions",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "S",   # bandit security
    "N",   # pep8-naming
]
ignore = [
    "S101",  # assert in tests is fine
    "S603",  # subprocess calls without shell=False — already guarded
    "B008",  # function calls in default args (FastAPI Depends pattern)
    "N806",  # uppercase variable in function (used for Type aliases)
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*" = ["S", "B"]   # security/bugbear too strict in tests
"backend/alembic/*" = ["ALL"]    # generated code

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
